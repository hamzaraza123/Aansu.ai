name: Keep Service Awake

on:
  schedule:
    # Run every 14 minutes (Render free tier spins down after 15 minutes of inactivity)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual run from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Web Service
        run: |
          curl -f -sS "${{ secrets.RENDER_APP_URL || 'https://aansu-ai.onrender.com' }}/api/health"
